# Left controller board: left-front + left-rear
left_board:
  device_name: "/dev/ttyUSB_l"
  baudrate: 1000000
  motor_ids: [11, 1, 2, 14, 7, 8]
  multi_turn_ids: [2, 8]

# Right controller board: right-front + right-rear
right_board:
  device_name: "/dev/ttyUSB_r"
  baudrate: 1000000
  motor_ids: [12, 3, 4, 13, 5, 6]
  multi_turn_ids: [4, 6]

# High-level gait control config
gait_controller:
  rate_hz: 100.0
  gait: "crawl"          # crawl or trot
  gait_frequency: 0.25    # Hz
  startup_pose_mode: "capture_current_as_home"  # configured_home: use motor_home_ticks as initial pose; capture_current_as_home: read current ticks as runtime initial pose

  # Nominal foot position in each leg local frame (mm).
  # x points forward from the leg root, y points laterally in the leg frame, z points downward.
  nominal_x: 120.0
  nominal_y: 0.0
  nominal_z: -299.2
  initial_pose_transition_time: 3.0   # Seconds for current pose -> initial pose interpolation.
  nominal_pose_transition_time: 8.0   # Seconds for initial pose -> nominal pose interpolation.
  transition_rate_hz: 60.0            # Update rate used during pose-to-pose interpolation.
  # Startup flow is split into two phases:
  # 1) calibrate and move smoothly to the initial pose defined by motor_home_ticks/startup_pose_mode
  # 2) after publishing /start_nominal_pose = true, move smoothly to nominal_*
  # 3) after nominal pose is reached, publish /start_gait_motion = true to start gait motion
  # Swing trajectory delta is still commanded in base frame: +x forward, +y left, +z upward.
  step_x: 40.0
  step_y: 0.0
  swing_height: 25.0
  gait_ramp_time: 2.0         # Seconds to ramp gait amplitude from 0 to full after entering nominal pose.
  output_smoothing_alpha: 0.25  # First-order smoothing on generated foot deltas, 0..1. Larger is more responsive.

  crawl_swing_ratio: 0.25
  trot_swing_ratio: 0.50

  # Active chain geometric lengths from your MDH table (mm)
  link_coxa: 44.75
  link_femur: 74.0
  link_tibia: 150.0

  # Passive chain and end-effector geometric lengths mapped from MDH (mm)
  link_a3: 41.5
  link_d6: -13.5
  link_d7: -106.7

  # Base geometry (mm) - Leg origin distance from base center
  base_radius: 203.06

  # Output-side reducer ratio for joint 2 and joint 3.
  # If both joints use the same reducer, set them to the same value.
  gear_ratio_joint2: 1.0
  gear_ratio_joint3: 4.421

  # Operating mode handling in quadruped_core follows board multi_turn_ids by default.
  # These IDs are in position mode (3) and can still use gear_ratio_joint2/3 if a reducer exists.
  position_mode_ids: [11, 12, 13, 14, 1, 3, 5, 7]

  # Per-joint mechanical limits (deg)
  joint_limit_deg:
    j1: [-90.0, 90.0]
    j2: [-10.0, 190.0]
    j3: [-100.0, 100.0]

  # Zero-offset at output joint side (deg)
  # q2 now has a -90 offset in MDH, and q3 is direct.
  joint_zero_deg:
    j1: 0.0
    j2: 90.0
    j3: 0.0

  # Default motor mapping [joint1, joint2, joint3] for each leg
  legs:
    lf:
      motor_ids: [11, 1, 2]
      hip_yaw_deg: 45.0
    rf:
      motor_ids: [12, 3, 4]
      hip_yaw_deg: -45.0
    lr:
      motor_ids: [14, 7, 8]
      hip_yaw_deg: 135.0
    rr:
      motor_ids: [13, 5, 6]
      hip_yaw_deg: -135.0

  # Tick zero and direction for each motor (must be calibrated on real robot).
  # When startup_pose_mode is set to capture_current_as_home, the current motor ticks
  # are captured at startup and used as runtime home without overwriting this file.
  # motor_home_ticks is the tick value corresponding to zero position of the output joint, 
  # and motor_dir is the direction multiplier to convert from positive joint angle to positive tick value. 
  # For example, if a motor has motor_home_ticks=2048 and motor_dir=1, then a joint angle of 0 deg corresponds to 2048 ticks, 
  # and a joint angle of +90 deg corresponds to 2048 + (4096/360)*90 = 3072 ticks.
  # If the same motor has motor_dir=-1, then a joint angle of +90 deg corresponds to 2048 - (4096/360)*90 = 1024 ticks.
  motor_home_ticks:
    "1": 2126
    "2": 448
    "3": 1528
    "4": 5119
    "5": 3921
    "6": 117
    "7": 3045
    "8": 1486
    "11": 2014
    "12": 1903
    "13": 2041
    "14": 1022

  motor_dir:
    "1": 1
    "2": 1
    "3": -1
    "4": -1
    "5": 1
    "6": 1
    "7": -1
    "8": -1
    "11": -1
    "12": -1
    "13": -1
    "14": -1

  single_turn_ids: [11, 12, 13, 14]
